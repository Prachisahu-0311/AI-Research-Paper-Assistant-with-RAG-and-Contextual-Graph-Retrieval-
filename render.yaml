services:
  - type: web
    name: graphrag-demo
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: chroma-data
      mountPath: /opt/render/project/src/data/chroma_db
      sizeGB: 1
